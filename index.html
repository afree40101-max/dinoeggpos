<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🦖 恐龍蛋 POS 雲端同步版</title>
<style>
    :root { 
        --orange: #ffedd5; --grey: #f1f5f9; 
        --dark-orange: #f97316; --green: #22c55e; --red: #ef4444; 
        --slate: #64748b; --purple: #a855f7; --blue: #3b82f6; 
        --yellow: #fef08a; --table-border: #eee;
    }
    body { margin: 0; font-family: 'PingFang TC', sans-serif; background: #fffaf5; color: #1e293b; padding-bottom: 80px; }
    header { background: #86efac; text-align: center; padding: 15px; font-size: 24px; font-weight: bold; color: #166534; border-bottom: 3px solid #16a34a; }
    
    .channel-select { display: flex; padding: 12px; gap: 10px; }
    .channel-select button { flex: 1; padding: 14px; border-radius: 15px; border: 2px solid #ddd; background: #fff; font-weight: bold; font-size: 16px; }
    .channel-select button.active { background: #16a34a; color: #fff; border: none; }

    .items-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    .item-card { border-radius: 18px; padding: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .mode-store .item-card { background: var(--orange); border: 2px solid #fed7aa; }
    .mode-delivery .item-card { background: var(--grey); border: 2px solid #cbd5e1; }
    .item-name { font-size: 22px; font-weight: 900; display: block; margin-bottom: 2px; line-height: 1.2; }
    .item-price { font-weight: bold; color: var(--dark-orange); font-size: 14px; }
    .qty-controls { display: flex; justify-content: center; gap: 12px; align-items: center; margin-top: 8px; }
    .btn-qty { width: 44px; height: 44px; font-size: 26px; border-radius: 10px; border: 1px solid var(--dark-orange); background: #fff; color: var(--dark-orange); font-weight: bold; }

    .cart-box { background: #fff; margin: 10px; padding: 15px; border-radius: 20px; border: 2px solid #86efac; }
    .total-text { font-size: 34px; font-weight: bold; text-align: right; color: #166534; }
    .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }
    .pay-grid button { padding: 18px 5px; border: none; border-radius: 16px; font-weight: bold; color: #fff; font-size: 16px; }
    .btn-cash { background: #fbbf24; color: #422006 !important; }
    .btn-line { background: #06c755; }
    .btn-allpay { background: #3b82f6; }
    .btn-uber { background: #475569; }
    .btn-panda { background: #e11d48; }
    .btn-pre { background: var(--purple); }
    .btn-disc { background: var(--slate); }
    .btn-report { background: var(--slate); grid-column: span 2; }
    .btn-undo { background: #fef2f2; color: #b91c1c !important; border: 2px dashed #fecaca !important; grid-column: span 3; padding: 15px !important; margin-top: 5px; font-size: 18px !important; }

    .kds-section { background: #e2e8f0; margin: 12px; padding: 15px; border-radius: 20px; }
    .kds-card { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 10px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card-store { border-left-color: var(--green); }
    .card-delivery { border-left-color: var(--blue); }
    .card-preorder { border-left-color: var(--purple); }
    .urgent-15 { background: var(--yellow) !important; border-left-color: #eab308; }
    .urgent-10 { background: #fee2e2 !important; border-left-color: var(--red); animation: shake 0.5s infinite; }
    @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(2px,0); } 75% { transform: translate(-2px,0); } }

    .kds-tag { font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .kds-content { font-size: 32px; font-weight: 900; color: #000; margin: 15px 0; line-height: 1.3; }
    .btn-done-big { width: 100%; padding: 22px; background: #22c55e; color: #fff; border: none; border-radius: 12px; font-size: 26px; font-weight: bold; }

    .report-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
    .report-title { font-weight: bold; color: #5d2b1d; border-left: 4px solid var(--green); padding-left: 8px; margin: 20px 0 10px 0; }
    .report-item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8fafc; font-size: 16px; }
    .report-item-row:last-child { border-bottom: none; }
    .journal-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px; margin-bottom: 8px; }
    .btn-void { background: var(--red); color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
    .tag-pay { background: #dcfce7; padding: 2px 10px; border-radius: 6px; font-size: 14px; color: #166534; font-weight: bold; }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; align-items: flex-end; justify-content: center; }
    .overlay.active { display: flex; }
    .modal { background: #fff; width: 100%; max-width: 500px; padding: 25px; border-radius: 30px 30px 0 0; box-sizing: border-box; }
    .num-display { font-size: 50px; text-align: center; color: var(--blue); font-weight: bold; padding: 15px; background: #f8fafc; border-radius: 15px; margin-bottom: 10px; }
    .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .num-grid button { padding: 20px; font-size: 24px; font-weight: bold; border-radius: 15px; border: 1px solid #e2e8f0; background: #fff; }
</style>
</head>
<body class="mode-store" id="mainBody">

<header>🦖 恐龍蛋 POS</header>

<div class="channel-select">
    <button id="btnStore" class="active">🏠 現場點餐</button>
    <button id="btnDelivery">🛵 外送平台</button>
</div>

<div id="menuArea" class="items-container"></div>

<div class="cart-box">
    <div id="cartList">🛒 尚未點餐...</div>
    <div id="discountInfo" style="color:var(--red); font-weight:bold; text-align:right; display:none;">折扣: -$0</div>
    <div class="total-text">總計 $<span id="finalTotal">0</span></div>
</div>

<div class="pay-grid">
    <button class="btn-cash" onclick="openCashModal()">💰 現金</button>
    <button class="btn-line" onclick="handlePrePayment('LINE Pay')">LINE Pay</button>
    <button class="btn-allpay" onclick="handlePrePayment('全支付')">全支付</button>
    <button class="btn-uber" onclick="handlePrePayment('Uber')">Uber</button>
    <button class="btn-panda" onclick="handlePrePayment('熊貓')">熊貓</button>
    <button class="btn-pre" onclick="preorderStart()">⏰ 預約</button>
    <button class="btn-disc" onclick="openDiscountModal()">✂️ 折扣</button>
    <button class="btn-report" onclick="verifyAdmin()">📊 營運報表</button>
    <button class="btn-undo" onclick="undoLastOrder()">🚨 作廢上一筆</button>
</div>

<div class="kds-section"><div id="kdsArea"></div></div>

<div class="overlay" id="cashModal"><div class="modal"><div id="cashDisplay" class="num-display">0</div><div class="num-grid"><button onclick="quickCash(100)">+100</button><button onclick="quickCash(500)">+500</button><button onclick="quickCash(1000)">+1000</button><button onclick="pressNum('1')">1</button><button onclick="pressNum('2')">2</button><button onclick="pressNum('3')">3</button><button onclick="pressNum('4')">4</button><button onclick="pressNum('5')">5</button><button onclick="pressNum('6')">6</button><button onclick="pressNum('7')">7</button><button onclick="pressNum('8')">8</button><button onclick="pressNum('9')">9</button><button onclick="clearNum()">清除</button><button onclick="pressNum('0')">0</button><button style="background:var(--green); color:white;" onclick="submitCash()">結帳</button></div><button onclick="closeCash()" style="width:100%; margin-top:10px; padding:10px; border:none; background:#eee; border-radius:10px;">返回</button></div></div>
<div class="overlay" id="changeModal" style="align-items:center;"><div class="modal" style="border-radius:25px; text-align:center;"><h2>應找零</h2><div style="font-size:72px; color:var(--red); font-weight:bold; margin:20px 0;">$<span id="changeVal">0</span></div><button onclick="document.getElementById('changeModal').classList.remove('active')" style="width:100%; padding:20px; background:var(--green); color:#fff; border:none; border-radius:15px; font-weight:bold;">完成</button></div></div>
<div class="overlay" id="adminModal" style="align-items:center;"><div class="modal" style="border-radius:30px; max-height:85vh; overflow-y:auto; width:95%;"><div id="reportContent"></div></div></div>
<div class="overlay" id="discountModal"><div class="modal"><div id="discountDisplay" class="num-display">0</div><div class="num-grid"><button onclick="pressDisc('1')">1</button><button onclick="pressDisc('2')">2</button><button onclick="pressDisc('3')">3</button><button onclick="pressDisc('4')">4</button><button onclick="pressDisc('5')">5</button><button onclick="pressDisc('6')">6</button><button onclick="pressDisc('7')">7</button><button onclick="pressDisc('8')">8</button><button onclick="pressDisc('9')">9</button><button onclick="clearDisc()">清除</button><button onclick="pressDisc('0')">0</button><button style="background:var(--green); color:white;" onclick="submitDiscount()">套用</button></div><button onclick="closeDiscount()" style="width:100%; margin-top:10px; padding:10px; border:none; background:#eee; border-radius:10px;">取消</button></div></div>
<div class="overlay" id="preorderPayModal" style="align-items:center;"><div class="modal" style="border-radius:30px; width:90%;"><h3 style="text-align:center;">預約單結帳</h3><div class="pay-grid" id="preorderPayGrid"></div><button onclick="document.getElementById('preorderPayModal').classList.remove('active')" style="width:100%; padding:15px; margin-top:10px; background:#eee; border:none; border-radius:12px;">取消</button></div></div>

<script>
const ADMIN_PIN = "771130";
// 已填入您的最新 Google Script 網址
const GAS_URL = "https://script.google.com/macros/s/AKfycbxlMKcjjg9BhFEXirStYo1dgXLfytcNS23sdFLGWAwIu5fg_uVrDr5tLdE_Xx8BOZTAxQ/exec";

const products = [
    { name: "原味", store: 50, delivery: 65 }, { name: "OREO", store: 60, delivery: 75 },
    { name: "起司", store: 65, delivery: 80 }, { name: "卡士達", store: 65, delivery: 75 },
    { name: "黑糖麻糬", store: 65, delivery: 80 }, { name: "巧克力", store: 60, delivery: 80 },
    { name: "爆漿巧克力", store: 65, delivery: 85 }, { name: "桂冠湯圓", store: 80, delivery: 95 },
    { name: "【恐龍樂園】", store: 0, delivery: 100, isCombo: true },
    { name: "【卡士達套餐】", store: 0, delivery: 115, isCombo: true },
    { name: "【Oreo套餐】", store: 0, delivery: 120, isCombo: true },
    { name: "【起司套餐】", store: 0, delivery: 125, isCombo: true }
];

let cart = {}, salesData = [], kdsOrders = [], currentChan = 'store', cashTyped = "", discTyped = "", discountAmount = 0, orderCount = 0, tempPreorderData = null;

// 同步資料至雲端
function syncToGoogle(orderData) {
    if (!GAS_URL) return;
    fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(orderData)
    }).catch(e => console.log("同步失敗:", e));
}

function checkUrgency(preTime) {
    if (!preTime) return "";
    const [hh, mm] = preTime.split(':');
    const target = new Date(); target.setHours(parseInt(hh), parseInt(mm), 0);
    const diff = (target - new Date()) / 60000;
    if (diff <= 10) return "urgent-10";
    if (diff <= 15) return "urgent-15";
    return "";
}

function showReport() {
    let total = 0, pay = {"現金":0,"LINE Pay":0,"全支付":0,"Uber":0,"熊貓":0};
    let timeStats = {}, itemSales = {}, journalH = "";

    salesData.forEach(s => {
        if(!s.void) {
            total += s.amount; pay[s.type] = (pay[s.type] || 0) + s.amount;
            const hr = s.time.split(':')[0].padStart(2, '0');
            const slot = `${hr}:00 - ${hr}:59`;
            if(!timeStats[slot]) timeStats[slot] = {c:0, a:0};
            timeStats[slot].c++; timeStats[slot].a += s.amount;
            for(let name in s.items) { itemSales[name] = (itemSales[name] || 0) + s.items[name]; }
        }
        journalH += `<div class="report-card">
            <div class="journal-top"><strong>#${s.no} ${s.time}</strong><span class="tag-pay">${s.type}</span></div>
            ${!s.void ? `<button class="btn-void" onclick="voidOrder(${s.id})">退單</button>` : '<span style="color:red">已作廢</span>'}
            <div style="margin:5px 0;">${Object.entries(s.items).map(([n, q]) => `${n}x${q}`).join(", ")}</div>
            <div style="text-align:right; font-weight:bold; color:var(--red); font-size:18px;">$${s.amount}</div>
        </div>`;
    });

    const sortedSlots = Object.keys(timeStats).sort();
    let timeListH = sortedSlots.map(slot => `<div class="report-item-row"><span>${slot}</span><span>${timeStats[slot].c} 客 / $${timeStats[slot].a}</span></div>`).join('');

    const sortedItems = Object.entries(itemSales).sort((a,b) => b[1] - a[1]);
    let itemListH = sortedItems.map(([name, qty]) => `<div class="report-item-row"><span>${name}</span><span>${qty} 份</span></div>`).join('');

    document.getElementById('reportContent').innerHTML = `
        <div style="display:flex; justify-content:space-between; position:sticky; top:0; background:white; padding:10px; z-index:100; border-bottom:1px solid #eee;">
            <button onclick="document.getElementById('adminModal').classList.remove('active')" style="background:var(--slate); color:white; border:none; padding:8px 15px; border-radius:8px;">⬅ 返回</button>
            <strong>📊 營運報表</strong>
        </div>
        <div style="background:var(--green); color:white; padding:20px; border-radius:15px; text-align:center; margin-top:10px;">今日實收總額 <br><span style="font-size:32px; font-weight:bold;">$${total}</span></div>
        <div class="report-title">💰 付款別明細</div>
        <div class="report-card">${Object.entries(pay).map(([k,v])=>`<div class="report-item-row"><span>${k}</span><span>$${v}</span></div>`).join('')}</div>
        <div class="report-title">🕒 時段分析</div>
        <div class="report-card">${timeListH || '尚無數據'}</div>
        <div class="report-title">🏆 熱銷排行榜</div>
        <div class="report-card">${itemListH || '尚未開張'}</div>
        <div class="report-title">📜 消費流水帳</div>
        ${journalH || "<div style='text-align:center; padding:20px;'>尚無紀錄</div>"}
    `;
    document.getElementById('adminModal').classList.add('active');
}

function finishOrder(type, fromPreorder = null) {
    let o;
    const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
    if (fromPreorder) { o = fromPreorder; o.type = type; o.time = now; }
    else {
        const total = parseInt(document.getElementById('finalTotal').innerText);
        if(total === 0) return;
        o = { no: (++orderCount).toString().padStart(3, '0'), id: Date.now(), time: now, type, amount: total, items: {...cart}, chan: currentChan, discount: discountAmount, void: false };
        kdsOrders.push(o); clearCurrentOrder();
    }
    salesData.push(o);
    syncToGoogle(o);
    if (currentChan === 'delivery') { currentChan = 'store'; updateChan(); }
    renderKDS();
}

function renderKDS() {
    let h = "";
    kdsOrders.sort((a,b) => (a.preorderTime || '99:99').localeCompare(b.preorderTime || '99:99')).forEach(o => {
        let isPre = !!o.preorderTime;
        h += `<div class="kds-card ${isPre?'card-preorder':(o.chan==='delivery'?'card-delivery':'card-store')} ${checkUrgency(o.preorderTime)}">
            <div class="kds-tag"><span>#${o.no} ${isPre?'⏰'+o.preorderTime:''}</span><span>${o.type || '待結帳'}</span></div>
            <div class="kds-content">${Object.entries(o.items).map(([n, q]) => `${n} x ${q}`).join("<br>")}</div>
            <button class="btn-done-big" onclick="handleKDSDone(${o.id})">出餐完成</button>
        </div>`;
    });
    document.getElementById('kdsArea').innerHTML = h || "☕ 暫無待辦單";
}

function handleKDSDone(id) {
    const o = kdsOrders.find(x => x.id === id);
    if (o && o.preorderTime && !o.type) {
        tempPreorderData = o;
        let h = "";
        ["現金", "LINE Pay", "全支付", "Uber", "熊貓"].forEach(t => h += `<button onclick="confirmPreorderPay('${t}')" style="background:var(--dark-orange); color:white; padding:15px; border-radius:10px; border:none;">${t}</button>`);
        document.getElementById('preorderPayGrid').innerHTML = h;
        document.getElementById('preorderPayModal').classList.add('active');
    } else { kdsOrders = kdsOrders.filter(x => x.id !== id); renderKDS(); }
}

function confirmPreorderPay(t) {
    if (t === "現金") { document.getElementById('preorderPayModal').classList.remove('active'); openCashModal(); }
    else { const o = tempPreorderData; kdsOrders = kdsOrders.filter(x => x.id !== o.id); finishOrder(t, o); document.getElementById('preorderPayModal').classList.remove('active'); tempPreorderData = null; }
}

function openCashModal() { if(parseInt(document.getElementById('finalTotal').innerText) === 0 && !tempPreorderData) return; cashTyped = ""; document.getElementById('cashDisplay').innerText = "0"; document.getElementById('cashModal').classList.add('active'); }
function quickCash(v) { let cur = parseInt(document.getElementById('cashDisplay').innerText) || 0; cashTyped = (cur + v).toString(); document.getElementById('cashDisplay').innerText = cashTyped; }
function pressNum(n) { cashTyped += n; document.getElementById('cashDisplay').innerText = parseInt(cashTyped) || 0; }
function clearNum() { cashTyped = ""; document.getElementById('cashDisplay').innerText = "0"; }
function closeCash() { document.getElementById('cashModal').classList.remove('active'); }
function submitCash() {
    const target = tempPreorderData ? tempPreorderData.amount : parseInt(document.getElementById('finalTotal').innerText);
    const input = parseInt(document.getElementById('cashDisplay').innerText);
    if (input < target) return alert("金額不足");
    document.getElementById('changeVal').innerText = input - target;
    document.getElementById('cashModal').classList.remove('active');
    document.getElementById('changeModal').classList.add('active');
    if (tempPreorderData) { const o = tempPreorderData; kdsOrders = kdsOrders.filter(x => x.id !== o.id); finishOrder("現金", o); tempPreorderData = null; } 
    else { finishOrder("現金"); }
}

function updateQty(n, d) { cart[n] = (cart[n] || 0) + d; if (cart[n] <= 0) delete cart[n]; renderMenu(); updateCartUI(); }
function renderMenu() {
    let h = "";
    products.forEach(p => {
        if (currentChan === 'store' && p.isCombo) return;
        const price = (currentChan === 'store' ? p.store : p.delivery);
        h += `<div class="item-card"><span class="item-name">${p.name}</span><div class="item-price">$${price}</div><div class="qty-controls"><button class="btn-qty" onclick="updateQty('${p.name}', -1)">-</button><span style="font-size:24px; font-weight:bold;">${cart[p.name] || 0}</span><button class="btn-qty" onclick="updateQty('${p.name}', 1)">+</button></div></div>`;
    });
    document.getElementById('menuArea').innerHTML = h;
}
function updateCartUI() {
    let s = 0, h = "";
    for (let n in cart) {
        const p = products.find(x => x.name === n);
        s += cart[n] * (currentChan === 'store' ? p.store : p.delivery);
        h += `<div>✅ ${n} x${cart[n]}</div>`;
    }
    const final = Math.max(0, s - discountAmount);
    document.getElementById('finalTotal').innerText = final;
    document.getElementById('cartList').innerHTML = h || "🛒 尚未點餐...";
    document.getElementById('discountInfo').style.display = discountAmount > 0 ? 'block' : 'none';
}
function openDiscountModal() { discTyped = ""; document.getElementById('discountDisplay').innerText = "0"; document.getElementById('discountModal').classList.add('active'); }
function closeDiscount() { document.getElementById('discountModal').classList.remove('active'); }
function pressDisc(n) { discTyped += n; document.getElementById('discountDisplay').innerText = parseInt(discTyped) || 0; }
function clearDisc() { discTyped = ""; document.getElementById('discountDisplay').innerText = "0"; }
function submitDiscount() { discountAmount = parseInt(discTyped) || 0; updateCartUI(); closeDiscount(); }
function preorderStart() {
    const total = parseInt(document.getElementById('finalTotal').innerText);
    if(total === 0) return;
    const time = prompt("預約時間 (例 15:30)", ""); if (!time) return;
    const o = { no: "預" + (++orderCount).toString().slice(-2), id: Date.now(), preorderTime: time, amount: total, items: {...cart}, chan: currentChan, discount: discountAmount, void: false };
    kdsOrders.push(o); renderKDS(); clearCurrentOrder();
}
function undoLastOrder() {
    const last = [...salesData].reverse().find(o => !o.void);
    if (!last || !confirm(`作廢單號 #${last.no}？`)) return;
    last.void = true; kdsOrders = kdsOrders.filter(x => x.id !== last.id);
    currentChan = last.chan; cart = {...last.items}; discountAmount = last.discount;
    updateChan(); updateCartUI(); renderKDS();
}
function voidOrder(id) { 
    if(confirm("確定作廢？")){ 
        const o = salesData.find(x => x.id === id); 
        if(o){ 
            o.void=true; 
            syncToGoogle({...o, no: o.no + "(退單)"});
            showReport(); 
        } 
    } 
}
function verifyAdmin() { if (prompt("密碼") === ADMIN_PIN) showReport(); }
function clearCurrentOrder() { cart = {}; discountAmount = 0; renderMenu(); updateCartUI(); }
function handlePrePayment(type) { finishOrder(type); }
document.getElementById('btnStore').onclick = () => { currentChan = 'store'; updateChan(); };
document.getElementById('btnDelivery').onclick = () => { currentChan = 'delivery'; updateChan(); };
function updateChan() { 
    document.getElementById('btnStore').className = (currentChan==='store'?'active':''); 
    document.getElementById('btnDelivery').className = (currentChan==='delivery'?'active':''); 
    document.getElementById('mainBody').className = (currentChan==='store'?'mode-store':'mode-delivery');
    renderMenu();
}
setInterval(renderKDS, 10000);
renderMenu();
</script>
</body>
</html>

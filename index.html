<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🦖 恐龍蛋 POS 旗艦版</title>
<style>
    :root { 
        --orange: #ffedd5; --grey: #f1f5f9; 
        --dark-orange: #f97316; --green: #22c55e; --red: #ef4444; 
        --slate: #64748b; --purple: #a855f7; --blue: #3b82f6; 
        --yellow: #fef08a;
        --pink: #cd2701; /* 折扣鍵專用粉紅 */
        --cash-100: #fee2e2; /* 100 紅色系 */
        --cash-500: #fef3c7; /* 500 咖啡/深色系 */
        --cash-1000: #dbeafe; /* 1000 藍色系 */
    }
    body { margin: 0; font-family: 'PingFang TC', sans-serif; background: #fffaf5; color: #1e293b; padding-bottom: 80px; }
    header { background: #86efac; text-align: center; padding: 15px; font-size: 24px; font-weight: bold; color: #166534; border-bottom: 3px solid #16a34a; }
    
    .channel-select { display: flex; padding: 12px; gap: 10px; }
    .channel-select button { flex: 1; padding: 14px; border-radius: 15px; border: 2px solid #ddd; background: #fff; font-weight: bold; font-size: 16px; }
    .channel-select button.active { background: #16a34a; color: #fff; border: none; }

    .items-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    .item-card { border-radius: 18px; padding: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .mode-store .item-card { background: var(--orange); border: 2px solid #fed7aa; }
    .mode-delivery .item-card { background: var(--grey); border: 2px solid #cbd5e1; }
    .item-name { font-size: 22px; font-weight: 900; display: block; margin-bottom: 2px; line-height: 1.2; }
    .item-price { font-weight: bold; color: var(--dark-orange); font-size: 14px; }
    .qty-controls { display: flex; justify-content: center; gap: 12px; align-items: center; margin-top: 8px; }
    .btn-qty { width: 44px; height: 44px; font-size: 26px; border-radius: 10px; border: 1px solid var(--dark-orange); background: #fff; color: var(--dark-orange); font-weight: bold; }

    .cart-box { background: #fff; margin: 10px; padding: 15px; border-radius: 20px; border: 2px solid #86efac; }
    .total-text { font-size: 34px; font-weight: bold; text-align: right; color: #166534; }

    .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }
    .pay-grid button { padding: 18px 5px; border: none; border-radius: 16px; font-weight: bold; color: #fff; font-size: 16px; }
    .btn-cash { background: #fbbf24; color: #422006 !important; }
    .btn-line { background: #06c755; }
    .btn-allpay { background: #3b82f6; }
    .btn-uber { background: #475569; }
    .btn-panda { background: #ed5180; }
    .btn-pre { background: var(--purple); }
    .btn-disc { background: #cd2701 !important; } /* 修改折扣鍵為明顯粉紅/桃紅 */
    .btn-report { background: var(--slate); grid-column: span 2; }
    .btn-undo { background: #fef2f2; color: #b91c1c !important; border: 2px dashed #fecaca !important; grid-column: span 3; padding: 15px !important; margin-top: 5px; font-size: 18px !important; }

    /* 現金快捷鍵顏色 */
    .btn-q100 { background: #2563eb !important; color: #fff !important; border: 1px solid #ef4444 !important; }
    .btn-q500 { background: #2563eb !important; color: #fff !important; }
    .btn-q1000 { background: #2563eb !important; color: #fff !important; }

    .kds-section { background: #e2e8f0; margin: 12px; padding: 15px; border-radius: 20px; }
    .kds-card { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 12px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
    .card-store { border-left-color: var(--green); }
    .card-delivery { border-left-color: var(--blue); }
    .card-preorder { border-left-color: var(--purple); }
    .urgent-15 { background: var(--yellow) !important; border-left-color: #eab308 !important; }
    .urgent-10 { background: #fee2e2 !important; border-left-color: var(--red) !important; animation: shake 0.5s infinite; }
    @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(2px,0); } 75% { transform: translate(-2px,0); } }

    .kds-tag { font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; }
    .pay-tag { font-size: 14px; background: #f1f5f9; padding: 2px 8px; border-radius: 6px; color: var(--slate); }
    .kds-content { font-size: 34px; font-weight: 900; color: #000; margin: 15px 0; line-height: 1.2; }
    .btn-done-big { width: 100%; padding: 25px; background: #22c55e; color: #fff; border: none; border-radius: 15px; font-size: 28px; font-weight: bold; box-shadow: 0 4px 0 #16a34a; }

    .report-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
    .report-title { font-weight: bold; color: #5d2b1d; border-left: 4px solid var(--green); padding-left: 8px; margin: 20px 0 10px 0; }
    .report-item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f8fafc; font-size: 16px; }
    .tab-container { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 45px; background: white; z-index: 101; padding: 5px 0; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; border-radius: 10px; font-weight: bold; color: var(--slate); }
    .tab-btn.active { background: var(--green); color: white; }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; align-items: flex-end; justify-content: center; }
    .overlay.active { display: flex; }
    .modal { background: #fff; width: 100%; max-width: 500px; padding: 25px; border-radius: 30px 30px 0 0; box-sizing: border-box; }
    .num-display { font-size: 50px; text-align: center; color: var(--blue); font-weight: bold; padding: 15px; background: #f8fafc; border-radius: 15px; margin-bottom: 10px; }
    .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .num-grid button { padding: 20px; font-size: 24px; font-weight: bold; border-radius: 15px; border: 1px solid #e2e8f0; background: #fff; }
    .flavor-btn { padding: 15px; font-size: 18px; font-weight: bold; border-radius: 12px; border: 2px solid var(--orange); background: #fff; }
</style>
</head>
<body class="mode-store" id="mainBody">

<header>🦖 恐龍蛋 POS</header>

<div class="channel-select">
    <button id="btnStore" class="active">🏠 現場點餐</button>
    <button id="btnDelivery">🛵 外送平台</button>
</div>

<div id="menuArea" class="items-container"></div>

<div class="cart-box">
    <div id="cartList">🛒 尚未點餐...</div>
    <div id="discountInfo" style="color:var(--red); font-weight:bold; text-align:right; display:none;">折扣: -$0</div>
    <div class="total-text">總計 $<span id="finalTotal">0</span></div>
</div>

<div class="pay-grid">
    <button class="btn-cash" onclick="openCashModal()">💰 現金</button>
    <button class="btn-line" onclick="handlePrePayment('LINE Pay')">LINE Pay</button>
    <button class="btn-allpay" onclick="handlePrePayment('全支付')">全支付</button>
    <button class="btn-uber" onclick="handlePrePayment('Uber')">Uber</button>
    <button class="btn-panda" onclick="handlePrePayment('熊貓')">熊貓</button>
    <button class="btn-pre" onclick="preorderStart()">⏰ 預約</button>
    <button class="btn-disc" onclick="openDiscountModal()">✂️ 折扣</button>
    <button class="btn-report" onclick="verifyAdmin()">📊 報表與結帳</button>
    <button class="btn-undo" onclick="undoLastOrder()">🚨 作廢上一筆</button>
</div>

<div class="kds-section"><div id="kdsArea"></div></div>

<div class="overlay" id="cashModal">
    <div class="modal">
        <div id="cashDisplay" class="num-display">0</div>
        <div class="num-grid">
            <button class="btn-q100" onclick="quickCash(100)">100</button>
            <button class="btn-q500" onclick="quickCash(500)">500</button>
            <button class="btn-q1000" onclick="quickCash(1000)">1000</button>
            <button onclick="pressNum('1')">1</button>
            <button onclick="pressNum('2')">2</button>
            <button onclick="pressNum('3')">3</button>
            <button onclick="pressNum('4')">4</button>
            <button onclick="pressNum('5')">5</button>
            <button onclick="pressNum('6')">6</button>
            <button onclick="pressNum('7')">7</button>
            <button onclick="pressNum('8')">8</button>
            <button onclick="pressNum('9')">9</button>
            <button onclick="clearNum()">清除</button>
            <button onclick="pressNum('0')">0</button>
            <button style="background:var(--green); color:white;" onclick="submitCash()">結帳</button>
        </div>
        <button onclick="closeCash()" style="width:100%; margin-top:10px; padding:10px; border:none; background:#eee; border-radius:10px;">返回</button>
    </div>
</div>

<div class="overlay" id="flavorModal" style="align-items:center;"><div class="modal" style="border-radius:25px; text-align:center;"><h2>選擇湯圓口味</h2><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><button class="flavor-btn" onclick="selectFlavor('花生')">🥜 花生</button><button class="flavor-btn" onclick="selectFlavor('芝麻')">⚫ 芝麻</button><button class="flavor-btn" onclick="selectFlavor('花生3芝麻2')">🌗 3花2芝</button><button class="flavor-btn" onclick="selectFlavor('芝麻3花生2')">🌓 3芝2花</button></div><button onclick="closeFlavorModal()" style="width:100%; margin-top:15px; padding:10px; border:none; background:#eee; border-radius:10px;">取消</button></div></div>
<div class="overlay" id="prePaySelectModal" style="align-items:center;"><div class="modal" style="border-radius:25px; text-align:center;"><h2>預約單出餐付款</h2><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><button class="btn-cash" style="padding:15px; border-radius:12px; background:#fbbf24; color:white; border:none; font-weight:bold;" onclick="confirmPreOrderPay('現金')">💰 現金</button><button class="btn-line" style="padding:15px; border-radius:12px; background:#06c755; color:white; border:none; font-weight:bold;" onclick="confirmPreOrderPay('LINE Pay')">LINE Pay</button><button class="btn-allpay" style="padding:15px; border-radius:12px; background:#3b82f6; color:white; border:none; font-weight:bold;" onclick="confirmPreOrderPay('全支付')">全支付</button><button class="btn-uber" style="padding:15px; border-radius:12px; background:#475569; color:white; border:none; font-weight:bold;" onclick="confirmPreOrderPay('Uber')">Uber</button><button class="btn-panda" style="padding:15px; border-radius:12px; background:#e11d48; color:white; border:none; font-weight:bold;" onclick="confirmPreOrderPay('熊貓')">熊貓</button></div><button onclick="document.getElementById('prePaySelectModal').classList.remove('active')" style="width:100%; margin-top:15px; padding:10px; border:none; background:#eee; border-radius:10px;">取消</button></div></div>
<div class="overlay" id="changeModal" style="align-items:center;"><div class="modal" style="border-radius:25px; text-align:center;"><h2>應找零</h2><div style="font-size:72px; color:var(--red); font-weight:bold; margin:20px 0;">$<span id="changeVal">0</span></div><button onclick="document.getElementById('changeModal').classList.remove('active')" style="width:100%; padding:20px; background:var(--green); color:#fff; border:none; border-radius:15px; font-weight:bold;">完成</button></div></div>
<div class="overlay" id="adminModal" style="align-items:center;"><div class="modal" style="border-radius:30px; max-height:85vh; overflow-y:auto; width:95%;"><div id="reportContent"></div></div></div>
<div class="overlay" id="discountModal"><div class="modal"><div id="discountDisplay" class="num-display">0</div><div class="num-grid"><button onclick="pressDisc('1')">1</button><button onclick="pressDisc('2')">2</button><button onclick="pressDisc('3')">3</button><button onclick="pressDisc('4')">4</button><button onclick="pressDisc('5')">5</button><button onclick="pressDisc('6')">6</button><button onclick="pressDisc('7')">7</button><button onclick="pressDisc('8')">8</button><button onclick="pressDisc('9')">9</button><button onclick="clearDisc()">清除</button><button onclick="pressDisc('0')">0</button><button style="background:var(--green); color:white;" onclick="submitDiscount()">套用</button></div><button onclick="closeDiscount()" style="width:100%; margin-top:10px; padding:10px; border:none; background:#eee; border-radius:10px;">取消</button></div></div>

<script>
const ADMIN_PIN = "771130";
// 已更新為您提供的新 GAS 網址
const GAS_URL = "https://script.google.com/macros/s/AKfycbwkXxrYEuLYJadyLIRn6OJUzNLnn54XMK4nW58aFybT2VnyAaw2pg2BFye1o2LLbqq8KQ/exec";

let salesData = JSON.parse(localStorage.getItem('dino_sales')) || [];
let kdsOrders = JSON.parse(localStorage.getItem('dino_kds')) || [];
let orderCount = parseInt(localStorage.getItem('dino_count')) || 0;
let currentReportTab = 'daily';
let pendingPreOrderId = null;

const products = [
    { name: "原味", store: 50, delivery: 65 }, { name: "OREO", store: 60, delivery: 75 },
    { name: "起司", store: 65, delivery: 80 }, { name: "卡士達", store: 65, delivery: 75 },
    { name: "黑糖麻糬", store: 65, delivery: 80 }, { name: "巧克力", store: 60, delivery: 80 },
    { name: "爆漿巧克力", store: 65, delivery: 85 }, { name: "桂冠湯圓", store: 80, delivery: 95, hasFlavor: true },
    { name: "【恐龍樂園】", store: 0, delivery: 100, isCombo: true },
    { name: "【卡士達套餐】", store: 0, delivery: 115, isCombo: true },
    { name: "【Oreo套餐】", store: 0, delivery: 120, isCombo: true },
    { name: "【起司套餐】", store: 0, delivery: 125, isCombo: true }
];

let cart = {}, currentChan = 'store', cashTyped = "", discTyped = "", discountAmount = 0;

function persist() {
    localStorage.setItem('dino_sales', JSON.stringify(salesData));
    localStorage.setItem('dino_kds', JSON.stringify(kdsOrders));
    localStorage.setItem('dino_count', orderCount);
}

function selectFlavor(flavor) {
    const key = `桂冠湯圓(${flavor})`;
    cart[key] = (cart[key] || 0) + 1;
    document.getElementById('flavorModal').classList.remove('active');
    updateCartUI();
}
function closeFlavorModal() { document.getElementById('flavorModal').classList.remove('active'); }

function getKdsStyle(order) {
    if (order.isPreorder) {
        const [hh, mm] = order.preTime.split(':');
        const target = new Date(); target.setHours(parseInt(hh), parseInt(mm), 0);
        const diff = (target - new Date()) / 60000;
        if (diff <= 10) return "card-preorder urgent-10";
        if (diff <= 15) return "card-preorder urgent-15";
        return "card-preorder";
    }
    return order.chan === 'delivery' ? 'card-delivery' : 'card-store';
}

function renderKDS() {
    let h = "";
    kdsOrders.forEach(o => {
        h += `<div class="kds-card ${getKdsStyle(o)}">
            <div class="kds-tag">
                <span>#${o.no} ${o.isPreorder?'⏰預約':''}</span>
                <span class="pay-tag">${o.type}</span>
                <span>${o.isPreorder ? o.preTime : o.time}</span>
            </div>
            <div class="kds-content">${Object.entries(o.items).map(([n, q]) => `${n} x ${q}`).join("<br>")}</div>
            <button class="btn-done-big" onclick="handleKDSDone(${o.id})">出餐完成</button>
        </div>`;
    });
    document.getElementById('kdsArea').innerHTML = h || "☕ 暫無待辦單";
}

function handleKDSDone(id) {
    const order = kdsOrders.find(x => x.id === id);
    if (order.isPreorder) {
        pendingPreOrderId = id;
        document.getElementById('prePaySelectModal').classList.add('active');
    } else {
        kdsOrders = kdsOrders.filter(x => x.id !== id);
        persist(); renderKDS();
    }
}

function confirmPreOrderPay(payType) {
    const order = kdsOrders.find(x => x.id === pendingPreOrderId);
    if (!order) return;
    if (payType === '現金') {
        document.getElementById('prePaySelectModal').classList.remove('active');
        cart = {...order.items};
        discountAmount = 0;
        currentChan = order.chan;
        updateCartUI();
        openCashModal();
    } else {
        order.type = payType;
        salesData.push({...order});
        kdsOrders = kdsOrders.filter(x => x.id !== pendingPreOrderId);
        if(GAS_URL) fetch(GAS_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(order)});
        pendingPreOrderId = null;
        document.getElementById('prePaySelectModal').classList.remove('active');
        persist(); renderKDS();
    }
}

function finishOrder(type) {
    const total = parseInt(document.getElementById('finalTotal').innerText);
    if(total === 0) return;
    const now = new Date();
    const o = {
        no: (++orderCount).toString().padStart(3, '0'),
        id: Date.now(),
        date: `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`,
        time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}),
        type, amount: total, items: {...cart}, chan: currentChan, void: false, isPreorder: false
    };
    salesData.push(o);
    if (pendingPreOrderId) {
        kdsOrders = kdsOrders.filter(x => x.id !== pendingPreOrderId);
        pendingPreOrderId = null;
    } else {
        kdsOrders.push(o);
    }
    if(GAS_URL) fetch(GAS_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(o)});
    persist(); clearCurrentOrder(); renderKDS();
    currentChan = 'store'; updateChan();
}

function preorderStart() {
    const total = parseInt(document.getElementById('finalTotal').innerText);
    if(total === 0) return;
    const time = prompt("預約取餐時間", "12:00");
    if(!time) return;
    const now = new Date();
    const o = {
        no: "預"+(++orderCount),
        id: Date.now(),
        date: `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`,
        time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}),
        preTime: time, type: "預約(未付)", amount: total, items: {...cart}, chan: currentChan, void: false, isPreorder: true
    };
    kdsOrders.push(o); persist(); clearCurrentOrder(); renderKDS();
    currentChan = 'store'; updateChan();
}

function undoLastOrder() {
    const last = salesData[salesData.length - 1]; 
    if (!last || last.void || !confirm(`作廢單號 #${last.no} 並將品項退回購物車？`)) return;
    last.void = true;
    kdsOrders = kdsOrders.filter(x => x.id !== last.id);
    cart = {...last.items};
    currentChan = last.chan;
    updateChan();
    persist(); renderKDS(); updateCartUI();
    alert(`單號 #${last.no} 已作廢，品項已回填。`);
}

function updateQty(n, d) {
    const p = products.find(x => x.name === n);
    if (p && p.hasFlavor && d > 0) {
        document.getElementById('flavorModal').classList.add('active');
        return;
    }
    cart[n] = (cart[n] || 0) + d;
    if (cart[n] <= 0) delete cart[n];
    updateCartUI();
}

function renderMenu() {
    let h = "";
    products.forEach(p => { if (currentChan === 'store' && p.isCombo) return;
        const price = (currentChan === 'store' ? p.store : p.delivery);
        let currentQty = cart[p.name] || 0;
        if(p.hasFlavor) {
            currentQty = Object.keys(cart).filter(k => k.startsWith(p.name)).reduce((sum, k) => sum + cart[k], 0);
        }
        h += `<div class="item-card"><span class="item-name">${p.name}</span><div class="item-price">$${price}</div><div class="qty-controls"><button class="btn-qty" onclick="updateQty('${p.name}', -1)">-</button><span style="font-size:24px; font-weight:bold;">${currentQty}</span><button class="btn-qty" onclick="updateQty('${p.name}', 1)">+</button></div></div>`;
    });
    document.getElementById('menuArea').innerHTML = h;
}

function updateCartUI() {
    let s = 0, h = ""; 
    for (let n in cart) { 
        const baseName = n.includes('(') ? n.split('(')[0] : n;
        const p = products.find(x => x.name === baseName); 
        s += cart[n] * (currentChan === 'store' ? p.store : p.delivery); 
        h += `<div>✅ ${n} x${cart[n]}</div>`; 
    }
    document.getElementById('finalTotal').innerText = Math.max(0, s - discountAmount);
    document.getElementById('cartList').innerHTML = h || "🛒 尚未點餐...";
    document.getElementById('discountInfo').style.display = discountAmount > 0 ? 'block' : 'none';
    document.getElementById('discountInfo').innerText = "折扣: -$" + discountAmount;
    renderMenu();
}

function updateReportView() {
    const now = new Date();
    const todayStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    const monthStr = `${now.getFullYear()}/${now.getMonth()+1}`;
    
    const getStats = (data) => {
        let total = 0, pay = {}, items = {}, hours = {};
        data.forEach(s => { 
            if(s.void) return; 
            total += s.amount; 
            pay[s.type] = (pay[s.type] || 0) + s.amount;
            const hr = s.time.split(':')[0]; 
            hours[hr] = (hours[hr] || 0) + s.amount;
            for(let n in s.items) items[n] = (items[n] || 0) + s.items[n]; 
        });
        return { total, pay, items, hours };
    };

    let contentH = `<div style="display:flex; justify-content:space-between; position:sticky; top:0; background:white; padding:10px 0; z-index:102; border-bottom:1px solid #eee;">
        <button onclick="document.getElementById('adminModal').classList.remove('active')" style="background:var(--slate); color:white; border:none; padding:8px 15px; border-radius:8px;">⬅ 返回</button>
        <strong>📊 報表中心</strong>
    </div>
    <div class="tab-container">
        <button class="tab-btn ${currentReportTab==='daily'?'active':''}" onclick="switchTab('daily')">今日帳目</button>
        <button class="tab-btn ${currentReportTab==='monthly'?'active':''}" onclick="switchTab('monthly')">月度分析</button>
    </div>`;

    const targetData = (currentReportTab === 'daily') ? salesData.filter(s => s.date === todayStr) : salesData.filter(s => s.date && s.date.includes(monthStr));
    const s = getStats(targetData);

    contentH += `<div class="report-title">${currentReportTab === 'daily' ? '今日實收' : now.getMonth()+1 + '月 累積'}</div>
    <div class="report-card" style="border-left:5px solid ${currentReportTab==='daily'?'var(--green)':'var(--blue)'};">
        <div class="report-item-row" style="font-size:20px;"><strong>總營收</strong><strong>$${s.total}</strong></div><hr>
        ${Object.entries(s.pay).map(([k,v])=>`<div class="report-item-row"><span>${k}</span><span>$${v}</span></div>`).join('') || '無數據'}
    </div>
    <div class="report-title">🏆 銷售排行榜</div><div class="report-card">${Object.entries(s.items).sort((a,b)=>b[1]-a[1]).map(([n,q])=>`<div class="report-item-row"><span>${n}</span><span>${q} 份</span></div>`).join('') || '無'}</div>
    <div class="report-title">🕒 時段分析</div><div class="report-card">${Object.entries(s.hours).sort((a,b)=>a[0]-b[0]).map(([hr, amt])=>`<div class="report-item-row"><span>${hr}:00 時段</span><span>$${amt}</span></div>`).join('') || '無數據'}</div>`;
    
    if(currentReportTab === 'daily') {
        contentH += `<div class="report-title">📜 今日流水帳</div>${targetData.slice().reverse().map(o=>`<div class="report-card" style="${o.void?'opacity:0.5':''}">
            <div style="display:flex; justify-content:space-between;"><strong>#${o.no} ${o.time}</strong><span>${o.type}</span></div>
            <div style="color:var(--slate); margin:5px 0;">${Object.entries(o.items).map(([n,q])=>`${n}x${q}`).join(', ')}</div>
            <div style="text-align:right; font-weight:bold;">${o.void?'[已作廢]':'$'+o.amount}</div></div>`).join('')}
        <button id="btnClear" onclick="dailyClear()" style="width:100%; padding:20px; background:var(--red); color:white; border:none; border-radius:15px; font-weight:bold; font-size:18px; margin-top:10px;">🚨 結束營業 (同步雲端並日清)</button>`;
    }
    document.getElementById('reportContent').innerHTML = contentH;
}

async function dailyClear() {
    const now = new Date();
    const todayStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    const todaySales = salesData.filter(s => s.date === todayStr && !s.void);
    
    if(todaySales.length === 0) {
        if(!confirm("今日尚無營業數據，確定要重置單號嗎？")) return;
    } else {
        if(!confirm("確定結束營業？系統將自動計算今日總帳並同步至 Google Sheets。")) return;
        
        let total = 0, itemsMap = {}, payMap = {};
        todaySales.forEach(s => {
            total += s.amount;
            payMap[s.type] = (payMap[s.type] || 0) + s.amount;
            for(let n in s.items) itemsMap[n] = (itemsMap[n] || 0) + s.items[n];
        });
        
        const summaryData = {
            type: "DAILY_SUMMARY",
            date: todayStr,
            totalAmount: total,
            itemStats: Object.entries(itemsMap).map(([n,q]) => `${n}:${q}`).join(", "),
            paymentStats: Object.entries(payMap).map(([k,v]) => `${k}:${v}`).join(", "),
            orderCount: todaySales.length
        };

        try {
            document.getElementById('btnClear').innerText = "⏳ 同步中...";
            await fetch(GAS_URL, {method:"POST", mode:"no-cors", body:JSON.stringify(summaryData)});
            alert("雲端同步成功！");
        } catch(e) {
            alert("雲端同步失敗，請檢查網路。");
        }
    }

    kdsOrders = []; 
    orderCount = 0; 
    persist(); 
    location.reload(); 
}

function openCashModal() { if(parseInt(document.getElementById('finalTotal').innerText) === 0) return; cashTyped = ""; document.getElementById('cashDisplay').innerText = "0"; document.getElementById('cashModal').classList.add('active'); }
function quickCash(v) { let cur = parseInt(document.getElementById('cashDisplay').innerText) || 0; cashTyped = (cur + v).toString(); document.getElementById('cashDisplay').innerText = cashTyped; }
function pressNum(n) { cashTyped += n; document.getElementById('cashDisplay').innerText = parseInt(cashTyped) || 0; }
function clearNum() { cashTyped = ""; document.getElementById('cashDisplay').innerText = "0"; }
function closeCash() { document.getElementById('cashModal').classList.remove('active'); }
function submitCash() {
    const target = parseInt(document.getElementById('finalTotal').innerText);
    const input = parseInt(document.getElementById('cashDisplay').innerText);
    if (input < target) return alert("金額不足");
    document.getElementById('changeVal').innerText = input - target;
    document.getElementById('cashModal').classList.remove('active');
    document.getElementById('changeModal').classList.add('active');
    finishOrder("現金");
}
function openDiscountModal() { discTyped = ""; document.getElementById('discountDisplay').innerText = "0"; document.getElementById('discountModal').classList.add('active'); }
function pressDisc(n) { discTyped += n; document.getElementById('discountDisplay').innerText = parseInt(discTyped) || 0; }
function submitDiscount() { discountAmount = parseInt(discTyped) || 0; updateCartUI(); document.getElementById('discountModal').classList.remove('active'); }
function clearDisc() { discTyped = ""; document.getElementById('discountDisplay').innerText = "0"; }
function closeDiscount() { document.getElementById('discountModal').classList.remove('active'); }
function verifyAdmin() { if (prompt("密碼") === ADMIN_PIN) { updateReportView(); document.getElementById('adminModal').classList.add('active'); } }
function clearCurrentOrder() { cart = {}; discountAmount = 0; renderMenu(); updateCartUI(); }
function handlePrePayment(type) { finishOrder(type); }
function switchTab(t) { currentReportTab = t; updateReportView(); }

document.getElementById('btnStore').onclick = () => { currentChan = 'store'; updateChan(); };
document.getElementById('btnDelivery').onclick = () => { currentChan = 'delivery'; updateChan(); };
function updateChan() { 
    document.getElementById('btnStore').className = (currentChan==='store'?'active':''); 
    document.getElementById('btnDelivery').className = (currentChan==='delivery'?'active':''); 
    document.getElementById('mainBody').className = (currentChan==='store'?'mode-store':'mode-delivery');
    renderMenu();
}
setInterval(renderKDS, 30000); 
renderMenu(); renderKDS();
</script>
